<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CPK Repository</title>
  <style>
    /* Soft dark theme */
    body {
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: #1e1f20;
      color: #e6e6e6;
    }
    header {
      background: #2a2b2d;
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #3b3c3e;
    }
    label { font-size: 14px; color: #cfcfcf; }
    input, select {
      margin-left: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #505254;
      background: #333435;
      color: #fff;
      font-size: 14px;
    }
    button {
      margin-left: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #10a37f;
      color: #333435;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      color: #10a37f;
    }

    #summary {
      padding: 12px 16px;
      font-size: 14px;
      color: #c9d1d9;
      border-bottom: 1px solid #2f3032;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 14px;
    }
    #summary .summary-count {
      font-weight: 500;
      color: #e6e6e6;
    }
    #summary .summary-tags {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    #summary .summary-tag {
      display: inline-flex;
      border-radius: 6px;
      border: 1px solid #3b3c3e;
      overflow: hidden;
      font-size: 13px;
      line-height: 1.2;
    }
    #summary .summary-tag-lbl {
      padding: 5px 9px;
      background: #333435;
      color: #9aa0a6;
      font-weight: 500;
    }
    #summary .summary-tag-val {
      padding: 5px 10px;
      background: #2a2b2d;
      color: #10a37f;
      font-weight: 600;
      font-family: monospace;
    }

    #results {
      padding: 12px 16px;
    }
    .pkg-wrapper {
      margin-bottom: 8px;
    }
    .pkg {
      background: #2d2f31;
      padding: 10px 12px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #3b3c3e;
      font-family: monospace;
      font-size: 14px;
      color: #e6e6e6;
      word-break: break-all;
    }
    .pkg .pkg-name {
      flex: 1;
    }
    .pkg a.download-icon,
    .pkg button.info-icon {
      text-decoration: none;
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
      transition: opacity 0.2s;
      color: #e6e6e6;
    }
    .pkg a.download-icon:hover,
    .pkg button.info-icon:hover {
      opacity: 1;
    }
    .pkg a.download-icon svg,
    .pkg button.info-icon svg {
      width: 100%;
      height: 100%;
      fill: #e6e6e6;
      stroke: #e6e6e6;
    }
    .pkg-info {
      display: none;
      margin-top: 4px;
      margin-left: 0;
      padding: 12px;
      background: #252627;
      border-radius: 6px;
      border: 1px solid #3b3c3e;
      font-family: monospace;
      font-size: 13px;
      color: #cfcfcf;
      width: 100%;
      box-sizing: border-box;
    }
    .pkg-info.visible {
      display: block;
    }
    .pkg-info-line {
      margin: 4px 0;
    }
    .pkg-info-label {
      color: #10a37f;
      font-weight: 600;
      margin-right: 8px;
    }
    .note { color: #9aa0a6; font-size: 13px; padding: 8px 16px; }

    .pagination {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #2f3032;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #c9d1d9;
    }
    .pagination .page-stat {
      color: #9aa0a6;
      font-size: 13px;
      margin-left: 4px;
    }
    .pagination button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      color: #9aa0a6;
    }
    .pagination button:disabled:hover {
      color: #9aa0a6;
    }
  </style>
</head>
<body>
  <header>
    <!-- Search controls -->
    <label>Package:
      <input id="searchName" type="text" placeholder="e.g. bash" />
    </label>

    <label>Version:
      <select id="versionSelect">
        <option value="">All</option>
        <option>3.8</option>
      </select>
    </label>

    <label>Arch:
      <select id="archSelect">
        <option value="">All</option>
        <option>arm64</option>
        <option>armhf</option>
        <option>armhf-efikamx</option>
        <option>x86_64</option>
        <option>i686</option>
	      <option>ppc64</option>
      </select>
    </label>

    <button id="searchBtn">Search</button>
  </header>

  <!-- Summary area (total + current filters) -->
  <div id="summary">Summary: loading indexes...</div>

  <!-- Results list -->
  <div id="results">Loading indexes...</div>

  <!--
  <div class="note">
    Files are read from CPKINDEX files located under each version/arch directory.
    Links are safe-encoded (so `#` becomes `%23`).
  </div>
  -->

<script>
/*
  index.html script
  - Edit `versions` and the Version &lt;select&gt; options to match the server (e.g. 3.7, 3.8, ...)
  - Script will try to fetch: `${version}/${arch}/CPKINDEX`
  - It collects filenames from those CPKINDEX files and builds a searchable index.
*/

// Edit these arrays to reflect your repository versions and arches
const versions = ["3.8"];
const arches = ["arm64", "armhf", "armhf-efikamx", "x86_64", "i686", "ppc64"];

// In-memory package list
let allPackages = [];
/** Last list from filters (pagination slices this array) */
let filteredView = [];
let currentPage = 1;
const PAGE_SIZE = 50;

// Utility: fetch a CPKINDEX and return array of filenames (or empty on fail)
async function fetchIndex(version, arch) {
  const url = `${version}/${arch}/CPKINDEX`;
  try {
    const res = await fetch(url);
    if (!res.ok) {
      console.warn("Index missing or not accessible:", url, "status:", res.status);
      return [];
    }
    const text = await res.text();
    // Split into non-empty lines; assume each line is the filename
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    // Map to objects with metadata
    return lines.map(fn => ({
      file: fn,                      // the raw filename string (contains '#')
      name: fn.split("#")[0] || fn,  // base name before '#'
      arch,
      version,
      // link will be built using encodeURIComponent when rendering
    }));
  } catch (err) {
    console.error("Failed to fetch index:", url, err);
    return [];
  }
}

// Load all indexes using Promise.allSettled so we finish even if some fetches fail
async function loadAllIndexes() {
  const promises = [];
  for (const v of versions) {
    for (const a of arches) {
      promises.push(fetchIndex(v, a));
    }
  }
  const results = await Promise.allSettled(promises);
  // Collect successes
  allPackages = [];
  let loadedCount = 0;
  for (const r of results) {
    if (r.status === "fulfilled") {
      const arr = r.value;
      if (arr.length > 0) loadedCount += 1;
      allPackages.push(...arr);
    } else {
      // note: individual fetchIndex already logs errors
    }
  }

  // Alphanumeric sort by filename (use numeric option for proper ordering)
  allPackages.sort((a, b) => a.file.localeCompare(b.file, undefined, { numeric: true, sensitivity: "base" }));

  console.log("Indexes loaded. packages:", allPackages.length, "indexes_with_content:", loadedCount);
  document.getElementById("summary").textContent = `Indexes loaded (${loadedCount}) — total packages discovered: ${allPackages.length}`;
  // After loading indexes, display filtered results (initially no filter)
  applyFilters();
}

function updateSummary(total) {
  const nameFilter = document.getElementById("searchName").value.trim().toLowerCase();
  const versionFilter = document.getElementById("versionSelect").value;
  const archFilter = document.getElementById("archSelect").value;
  const summaryEl = document.getElementById("summary");

  const countHtml = `<span class="summary-count">Found ${total} package${total !== 1 ? "s" : ""}</span>`;
  const tags = [];
  if (nameFilter) {
    tags.push(
      `<span class="summary-tag"><span class="summary-tag-lbl">Name</span><span class="summary-tag-val">${escapeHtml(nameFilter)}</span></span>`
    );
  }
  if (versionFilter) {
    tags.push(
      `<span class="summary-tag"><span class="summary-tag-lbl">Version</span><span class="summary-tag-val">${escapeHtml(versionFilter)}</span></span>`
    );
  }
  if (archFilter) {
    tags.push(
      `<span class="summary-tag"><span class="summary-tag-lbl">Arch</span><span class="summary-tag-val">${escapeHtml(archFilter)}</span></span>`
    );
  }
  const tagsHtml = tags.length ? `<span class="summary-tags">${tags.join("")}</span>` : "";
  summaryEl.innerHTML = countHtml + tagsHtml;
}

function renderPackageRow(p) {
  const encoded = encodeURIComponent(p.file);
  const link = `${p.version}/${p.arch}/${encoded}`;
  const infoFile = `${p.version}/${p.arch}/${encoded}.info`;
  const pkgId = `pkg-${p.file.replace(/[^a-zA-Z0-9]/g, "-")}`;
  return `
      <div class="pkg-wrapper">
        <div class="pkg">
          <span class="pkg-name">${escapeHtml(p.file)}</span>
          <button class="info-icon" onclick="toggleInfo('${pkgId}', '${infoFile}')" title="Show info">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
              <path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <a class="download-icon" href="${link}" title="Download" download>
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="7 10 12 15 17 10" fill="none" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <line x1="12" y1="15" x2="12" y2="3" fill="none" stroke="#e6e6e6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div id="${pkgId}" class="pkg-info"></div>
      </div>
    `;
}

function renderPaginationBar(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) return "";
  const prevDisabled = currentPage <= 1 ? " disabled" : "";
  const nextDisabled = currentPage >= totalPages ? " disabled" : "";
  return `
    <nav class="pagination" aria-label="Package pages">
      <button type="button" id="page-prev"${prevDisabled}>Previous</button>
      <button type="button" id="page-next"${nextDisabled}>Next</button>
      <span class="page-stat">Page ${currentPage} of ${totalPages} (${PAGE_SIZE} per page)</span>
    </nav>
  `;
}

function renderCurrentPage() {
  const resultsEl = document.getElementById("results");
  const total = filteredView.length;

  updateSummary(total);

  if (total === 0) {
    resultsEl.innerHTML = `<div class="note">No packages found.</div>`;
    return;
  }

  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredView.slice(start, start + PAGE_SIZE);

  resultsEl.innerHTML =
    slice.map(renderPackageRow).join("") + renderPaginationBar(total);

  const prevBtn = document.getElementById("page-prev");
  const nextBtn = document.getElementById("page-next");
  if (prevBtn && !prevBtn.disabled) {
    prevBtn.addEventListener("click", () => {
      currentPage -= 1;
      renderCurrentPage();
      resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }
  if (nextBtn && !nextBtn.disabled) {
    nextBtn.addEventListener("click", () => {
      currentPage += 1;
      renderCurrentPage();
      resultsEl.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  }
}

// Build the result list based on filters (resets to page 1)
function applyFilters() {
  const nameFilter = document.getElementById("searchName").value.trim().toLowerCase();
  const versionFilter = document.getElementById("versionSelect").value;
  const archFilter = document.getElementById("archSelect").value;

  filteredView = allPackages.filter(p => {
    const matchesName = !nameFilter || p.name.toLowerCase().includes(nameFilter);
    const matchesVersion = !versionFilter || p.version === versionFilter;
    const matchesArch = !archFilter || p.arch === archFilter;
    return matchesName && matchesVersion && matchesArch;
  });

  currentPage = 1;
  renderCurrentPage();
}

// Small helper to prevent HTML injection when showing filenames
function escapeHtml(s) {
  return (s + "").replace(/[&<>"']/g, function(m){
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m];
  });
}

// Toggle info panel and load .cpk.info file
async function toggleInfo(pkgId, infoFile) {
  const infoEl = document.getElementById(pkgId);
  if (!infoEl) return;

  // Toggle visibility
  const isVisible = infoEl.classList.contains("visible");

  if (isVisible) {
    // Hide
    infoEl.classList.remove("visible");
    infoEl.innerHTML = "";
  } else {
    // Show and load info
    infoEl.classList.add("visible");
    infoEl.innerHTML = "<div class='pkg-info-line'>Loading info...</div>";

    try {
      const res = await fetch(infoFile);
      if (!res.ok) {
        infoEl.innerHTML = "<div class='pkg-info-line'>Info file not available</div>";
        return;
      }
      const text = await res.text();
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

      // Parse .cpk.info format: "key: value"
      const info = {};
      lines.forEach(line => {
        if (line.startsWith("#")) return; // Skip comments
        const colonIdx = line.indexOf(":");
        if (colonIdx > 0) {
          const key = line.substring(0, colonIdx).trim();
          const value = line.substring(colonIdx + 1).trim();
          info[key] = value;
        }
      });

      // Display info in a formatted way
      const infoHtml = [
        info.checksum ? `<div class="pkg-info-line"><span class="pkg-info-label">Checksum:</span>${escapeHtml(info.checksum)}</div>` : "",
        info.name ? `<div class="pkg-info-line"><span class="pkg-info-label">Name:</span>${escapeHtml(info.name)}</div>` : "",
        info.version ? `<div class="pkg-info-line"><span class="pkg-info-label">Version:</span>${escapeHtml(info.version)}</div>` : "",
        info.arch ? `<div class="pkg-info-line"><span class="pkg-info-label">Arch:</span>${escapeHtml(info.arch)}</div>` : "",
        info.description ? `<div class="pkg-info-line"><span class="pkg-info-label">Description:</span>${escapeHtml(info.description)}</div>` : "",
        info.url ? `<div class="pkg-info-line"><span class="pkg-info-label">URL:</span><a href="${escapeHtml(info.url)}" target="_blank" style="color: #10a37f;">${escapeHtml(info.url)}</a></div>` : "",
        info.dependencies ? `<div class="pkg-info-line"><span class="pkg-info-label">Dependencies:</span>${escapeHtml(info.dependencies)}</div>` : "",
      ].filter(Boolean).join("");

      infoEl.innerHTML = infoHtml || "<div class='pkg-info-line'>No info available</div>";
    } catch (err) {
      console.error("Failed to load info:", infoFile, err);
      infoEl.innerHTML = "<div class='pkg-info-line'>Error loading info</div>";
    }
  }
}

// Wire the search button and Enter key
document.getElementById("searchBtn").addEventListener("click", applyFilters);
document.getElementById("searchName").addEventListener("keyup", function(e){
  if (e.key === "Enter") applyFilters();
});
document.getElementById("versionSelect").addEventListener("change", applyFilters);
document.getElementById("archSelect").addEventListener("change", applyFilters);

// Start
loadAllIndexes();
</script>
</body>
</html>
